# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# A sample workflow which sets up Snyk to analyze the full Snyk platform (Snyk Open Source, Snyk Code,
# Snyk Container and Snyk Infrastructure as Code)
# The setup installs the Snyk CLI - for more details on the possible commands
# check https://docs.snyk.io/snyk-cli/cli-reference
# The results of Snyk Code are then uploaded to GitHub Security Code Scanning
#
# In order to use the Snyk Action you will need to have a Snyk API token.
# More details in https://github.com/snyk/actions#getting-your-snyk-token
# or you can signup for free at https://snyk.io/login
#
# For more examples, including how to limit scans to only high-severity issues
# and fail PR checks, see https://github.com/snyk/actions/

name: Snyk Security

on:
    push:
        branches: ["main", "develop"]
    pull_request:
        branches: ["main", "develop"]

permissions:
    contents: read
    packages: read

jobs:
    snyk:
        permissions:
            contents: read # for actions/checkout to fetch code
            packages: read # required to resolve private dependencies from GitHub Packages
            security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
            actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
        runs-on: ubuntu-latest
        env:
            # This is where you will need to introduce the Snyk API token created with your Snyk account
            SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        steps:
            - uses: actions/checkout@v4
            - name: Set up JDK 25
              uses: actions/setup-java@v4
              with:
                  java-version: "25"
                  distribution: "temurin"
                  cache: maven
            - name: Set up Snyk CLI to check for security issues
              # Snyk can be used to break the build when it detects security issues.
              # In this case we want to upload the SAST issues to GitHub Code Scanning
              uses: snyk/actions/setup@806182742461562b67788a64410098c9d9b96adb
            - name: Build project with Maven
              env:
                  MAVEN_SETTINGS_XML_SECRET: ${{ secrets.MAVEN_SETTINGS_XML }}
                  MAVEN_SETTINGS_XML_VAR: ${{ vars.MAVEN_SETTINGS_XML }}
                  GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
                  GITHUB_TOKEN: ${{ github.token }}
              run: |
                  SETTINGS_CONTENT="$MAVEN_SETTINGS_XML_SECRET"
                  PACKAGE_TOKEN="$GITHUB_TOKEN"

                  if [ -n "$GH_PACKAGES_TOKEN" ]; then
                    PACKAGE_TOKEN="$GH_PACKAGES_TOKEN"
                  fi

                  if [ -z "$SETTINGS_CONTENT" ]; then
                    SETTINGS_CONTENT="$MAVEN_SETTINGS_XML_VAR"
                  fi

                  mkdir -p ~/.m2

                  if [ -n "$SETTINGS_CONTENT" ]; then
                    printf "%s" "$SETTINGS_CONTENT" > ~/.m2/settings.xml
                  else
                    cat > ~/.m2/settings.xml <<EOF
                  <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                            xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                            xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
                    <servers>
                      <server>
                        <id>github</id>
                        <username>${GITHUB_ACTOR}</username>
                        <password>${PACKAGE_TOKEN}</password>
                      </server>
                    </servers>
                  </settings>
                  EOF
                  fi

                  if ! grep -q "<id>github</id>" ~/.m2/settings.xml; then
                    echo "::error::MAVEN_SETTINGS_XML debe incluir <server><id>github</id>...</server> para autenticar contra GitHub Packages."
                    exit 1
                  fi

                  mvn -s ~/.m2/settings.xml -B clean install -DskipTests

            - name: Snyk Code test
              run: snyk code test --sarif > snyk-code.sarif || true

              # Runs Snyk Open Source (SCA) analysis and uploads result to Snyk.
            - name: Snyk Open Source monitor
              run: snyk monitor --all-projects || true

              # Runs Snyk Infrastructure as Code (IaC) analysis and uploads result to Snyk.
              # Run only when IaC files exist to avoid SNYK-CLI-0012.
            - name: No IaC files detected
              if: ${{ hashFiles('**/*.tf', '**/*.tf.json', '**/*.bicep', '**/cloudformation*.y*ml', '**/k8s/**/*.y*ml', '**/helm/**/*.y*ml') == '' }}
              run: echo "No valid IaC files found. Skipping Snyk IaC scan."

            - name: Snyk IaC test and report
              if: ${{ hashFiles('**/*.tf', '**/*.tf.json', '**/*.bicep', '**/cloudformation*.y*ml', '**/k8s/**/*.y*ml', '**/helm/**/*.y*ml') != '' }}
              run: snyk iac test --report || true

              # Push the Snyk Code results into GitHub Code Scanning tab
            - name: Upload result to GitHub Code Scanning
              uses: github/codeql-action/upload-sarif@v4
              if: always()
              continue-on-error: true
              with:
                  sarif_file: snyk-code.sarif
                  wait-for-processing: true
