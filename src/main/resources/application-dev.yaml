spring:
  datasource:
    url: jdbc:postgresql://postgres.railway.internal:5432/railway
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
  liquibase:
    enabled: true
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000

cj-dropshipping:
  base-url: ${CJ_BASE_URL}
  api-key: ${CJ_API_KEY}

logging:
  level:
    root: INFO