spring:
  datasource:
    url: ${PGDATABASE_URL}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
  liquibase:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:redis.railway.internal}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:2}
      timeout: 60000

server:
  port: 8080
  ssl:
    enabled: false

cj-dropshipping:
  base-url: ${CJ_BASE_URL}
  api-key: ${CJ_API_KEY}

services:
  cms:
    url: ${SERVICES_CMS_URL:http://mic-cmsservice.railway.internal:8080}

logging:
  level:
    root: INFO