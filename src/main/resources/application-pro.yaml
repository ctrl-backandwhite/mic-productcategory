spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/micproductcategory
    username: ${USER_NAME:pro_user}
    password: ${USER_PASSWORD:pro_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  liquibase:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000

logging:
  level:
    root: INFO

services:
  cms:
    url: ${SERVICES_CMS_URL:http://mic-cmsservice:8080}

