server:
  port: 6002
  server-header: ""
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never
    include-exception: false

spring:
  application:
    name: mic-sample
  banner:
    charset: UTF-8
  profiles:
    active: ${PROFILE:local},kibana
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterAccess=600s

cj-dropshipping:
  base-url: https://developers.cjdropshipping.com/api2.0/v1
  api-key: ${CJ_API_KEY}
  discovery:
    enabled: false
    cron-full: "0 0 2 * * SUN"
    cron-incremental: "0 0 4 * * *"
    cron-enrich: "0 0 */6 * * *"
    batch-size-enrich: 500
    max-pages-per-category: 200
    max-pages-per-keyword: 100
    page-size: 100
    rate-limit-wait-ms: 500
    keywords:
      - hoodie
      - t-shirt
      - pants
      - dress
      - sneakers
      - phone case
      - laptop bag
      - watch
      - sunglasses
      - jewelry
      - earrings
      - necklace
      - kitchen gadget
      - bathroom
      - garden tool
      - toy
      - puzzle
      - wireless earbuds
      - led light
      - fitness
      - yoga mat
      - water bottle
      - backpack
      - wallet
      - beauty
      - skincare
      - makeup
      - hair
      - pet
      - dog
      - cat
      - car accessories
      - camping
      - fishing
      - cycling
      - running
      - baby
      - kids
      - home decor
      - candle
      - pillow
      - blanket
      - organizer
      - storage
      - tools
      - drill
      - pen
      - notebook
      - sticker
      - mask
      - gloves
      - hat
      - scarf
      - belt
      - socks

services:
  cms:
    url: ${SERVICES_CMS_URL:http://localhost:6006}

management:
  tracing:
    sampling:
      probability: ${OTEL_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

resilience4j:
  retry:
    instances:
      cjApi:
        max-attempts: 3
        wait-duration: 2s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - org.springframework.web.reactive.function.client.WebClientException
          - java.io.IOException
        ignore-exceptions:
          - com.backandwhite.domain.exception.ExternalServiceException
  circuitbreaker:
    instances:
      cjApi:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
  # CJ Dropshipping Plus plan allows 2 requests/second per account. The
  # RateLimiter enforces this at the client level so parallel fetchers
  # cannot collectively exceed the quota and trip the CircuitBreaker with
  # "Too many requests" responses.
  ratelimiter:
    instances:
      cjApi:
        limit-for-period: 2
        limit-refresh-period: 1s
        timeout-duration: 30s
        register-health-indicator: true

